<meta content="{{ .Site.Title }}" property="og:site_name">
{{ if .Title }}
<meta content="{{ .Title }}" property="og:title">
{{ else }}
<meta content="{{ .Site.Title }}" property="og:title">
{{ end }}
{{ if .IsPage }}
<meta content="article" property="og:type">
{{ else }}
<meta content="website" property="og:type">
{{ end }}
{{ if .IsPage }}
<meta content="{{ .Content | plainify | truncate 200 }}" property="og:description">
{{ else }}
<meta content="{{ .Site.Params.description }}" property="og:description">
{{ end }}
{{ with .Permalink }}
<meta content="{{ . }}" property="og:url">
{{ end }}
{{ if and .IsPage (not .Date.IsZero) }}
<meta content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}" property="article:published_time">
<meta content="{{ "about.html" | absURL }}" property="article:author">
{{ end }}
{{ with .Params.image }}
<meta content="{{ printf "assets/img/posts/%s" . | absURL }}" property="og:image">
{{ else }}
<meta content="{{ "assets/img/logo-high-resolution.png" | absURL }}" property="og:image">
{{ end }}
